<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravu - Photo to Vector, Instantly</title>
  <meta name="description" content="Convert photographs into vector assets. AI-powered subject detection with SVG and DXF export." />
  <meta name="author" content="Gravu" />

  <meta property="og:title" content="Gravu - Photo to Vector, Instantly" />
  <meta property="og:site_name" content="Gravu" />
  <meta property="og:description" content="Convert photographs into vector assets. AI-powered subject detection with SVG and DXF export." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-base.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Gravu - Photo to Vector, Instantly" />
  <meta name="twitter:description" content="Convert photographs into vector assets. AI-powered subject detection with SVG and DXF export." />
  <meta name="twitter:site" content="@gravu_app" />
  <meta name="twitter:image" content="/og-base.png" />
</head>

<body>
  <div id="root"></div>
  <script>
    (function () {
      function showRefurbishingFallback() {
        var root = document.getElementById("root");
        if (!root || root.dataset.gravuLoaded === "true") return;
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8f8f6;padding:24px;font-family:monospace;color:#332e24;">' +
          '<main style="max-width:720px;border:1px solid #e5e0d7;background:#fff;padding:32px;">' +
          '<p style="margin:0 0 24px;text-transform:uppercase;letter-spacing:.22em;font-size:11px;color:#d96232;">Updating Gravu</p>' +
          '<h1 style="margin:0;font-family:serif;font-size:clamp(40px,8vw,78px);font-weight:300;line-height:.95;letter-spacing:-.06em;">We&apos;ll be right back.</h1>' +
          '<p style="margin:24px 0 0;font-size:12px;line-height:1.8;color:#6c6354;">Gravu is being updated right now. Refresh in a moment and your work should continue normally.</p>' +
          '<button onclick="window.location.reload()" style="margin-top:28px;border:1px solid #191713;background:#191713;color:white;padding:14px 18px;text-transform:uppercase;letter-spacing:.16em;font-size:10px;font-family:monospace;cursor:pointer;">Refresh page</button>' +
          '</main></div>';
      }

      window.__GRAVU_SHOW_REFURBISHING__ = showRefurbishingFallback;
      window.addEventListener(
        "error",
        function (event) {
          var target = event.target;
          var tagName = target && target.tagName;
          if (tagName === "SCRIPT" || tagName === "LINK") {
            showRefurbishingFallback();
          }
        },
        true
      );
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
