# Use X-Forwarded-Proto from an upstream TLS terminator (e.g. Coolify/Traefik)
# when it is set; fall back to $scheme for direct container access.
map $http_x_forwarded_proto $x_forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large image uploads (applies to all endpoints)
    client_max_body_size 20m;

    # Proxy all /api/ requests to the backend service
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass through the protocol as seen by the upstream TLS terminator
        # (e.g. Coolify/Traefik sets X-Forwarded-Proto: https before reaching
        # this nginx; $x_forwarded_proto falls back to $scheme if not set).
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
